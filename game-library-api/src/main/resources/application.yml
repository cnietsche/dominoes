server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:/data/game-library;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: false

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-at-least-32-chars}
  expiration-ms: ${JWT_EXPIRATION:86400000}

games:
  dominoes:
    stats-url: ${DOMINOES_STATS_URL:http://dominoes-api:8081/stats/online}
