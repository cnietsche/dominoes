services:
  game-library-api:
    build: ./game-library-api
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-must-be-at-least-32-chars}
      DOMINOES_STATS_URL: http://divinoes-api:8081/stats/online
    volumes:
      - h2-data:/data
    networks:
      - app-net

  dominoes-api:
    build: ./games/dominoes-api
    environment:
      LOBBY_SIZE: ${LOBBY_SIZE:-4}
      LOBBY_MIN_PLAYERS: ${LOBBY_MIN_PLAYERS:-1}
    networks:
      - app-net

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      - game-library-api
      - dominoes-api
    networks:
      - app-net

volumes:
  h2-data:

networks:
  app-net:
